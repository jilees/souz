# /etc/nginx/sites-available/souz-backend.conf
#
# This VPS already runs nginx for other services — add this as one more
# server block (own server_name/subdomain) rather than replacing anything.
# Applied once, by hand; the deploy-backend workflow never touches nginx.
#
# Single-user setup: nginx is the only thing the backend trusts. It
# authenticates you with HTTP Basic Auth, then unconditionally overwrites
# X-Souz-Proxy-Auth / X-User-Id — proxy_set_header replaces whatever a client
# sent, so a request can't spoof its own identity.
#
# Setup:
#   htpasswd -c /etc/nginx/souz-backend.htpasswd <your-username>
#   certbot --nginx -d souz.example.com   # rewrites the listen/ssl lines below
#   also install nginx-websocket-map.conf into /etc/nginx/conf.d/
#   (skip if a similar `map $http_upgrade $connection_upgrade` already exists
#   in another conf.d file — nginx only allows one such map per http block)

server {
    listen 80;
    server_name souz.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name souz.example.com;

    # ssl_certificate / ssl_certificate_key are added by certbot.

    auth_basic "Souz";
    auth_basic_user_file /etc/nginx/souz-backend.htpasswd;

    location = /health {
        auth_basic off;
        proxy_pass http://127.0.0.1:8080/health;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;

        # Trust boundary — must match SOUZ_BACKEND_PROXY_TOKEN in backend.env.
        proxy_set_header X-Souz-Proxy-Auth "REPLACE_WITH_SOUZ_BACKEND_PROXY_TOKEN_VALUE";
        proxy_set_header X-User-Id "owner";
    }
}
