slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slfj" }
tika-core = { module = "org.apache.tika:tika-core", version.ref = "tika" }
tika-parsersStandardPackage = { module = "org.apache.tika:tika-parsers-standard-package", version.ref = "tika" }
compose-ui-tooling-preview-desktop = { module = "org.jetbrains.compose.ui:ui-tooling-preview-desktop", version.ref = "composeMultiplatform" }
poi = { module = "org.apache.poi:poi", version.ref = "poi" }
poi-ooxml = { module = "org.apache.poi:poi-ooxml", version.ref = "poi" }
tdlight-java = { module = "it.tdlight:tdlight-java", version.ref = "tdlight-java" }
jsoup = { module = "org.jsoup:jsoup", version.ref = "jsoup" }
icu4j = { module = "com.ibm.icu:icu4j", version.ref = "icu4j" }
